# netlify.toml
# Netlify deployment configuration for Royal Crystal Academy frontend

[build]
  publish = "."

# Redirect all requests to index.html for single-page navigation
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
